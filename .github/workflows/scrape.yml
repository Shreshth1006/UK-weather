name: Scrape Met Office Weather

on:
  schedule:
    - cron: "7 2 * * *"     # ~7:37 AM IST
    - cron: "37 2 * * *"    # ~8:07 AM IST
    - cron: "7 4 * * *"     # ~9:37 AM IST
    - cron: "37 4 * * *"    # ~10:07 AM IST
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: scrape-weather
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: update weather data $(TZ=Europe/London date +'%Y-%m-%d %H:%M %Z')"
            git pull --rebase origin main
            git push origin main
          fi
