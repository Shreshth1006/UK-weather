name: Scrape Met Office Weather

on:
  schedule:
    - cron: "30 2 * * *"   # 2:30 AM UTC = 8:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: pip install playwright==1.44.0

      - name: Install Chromium (no system deps flag)
        run: python -m playwright install chromium

      - name: Install Chromium system dependencies manually
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 libnspr4 libatk1.0-0 libatk-bridge2.0-0 \
            libcups2 libdrm2 libxkbcommon0 libxcomposite1 \
            libxdamage1 libxfixes3 libxrandr2 libgbm1 libasound2t64

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update weather data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push