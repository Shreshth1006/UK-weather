name: Scrape Met Office Weather

on:
  schedule:
    - cron: "30 2 * * *"   # 2:30 AM UTC = 8:00 AM IST daily
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fix libasound2 dependency
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2t64
          sudo ln -sf /usr/lib/x86_64-linux-gnu/libasound.so.2 /usr/lib/x86_64-linux-gnu/libasound.so.2.0.0 || true

      - name: Install Playwright and Chromium
        run: |
          pip install playwright==1.44.0
          python -m playwright install --with-deps chromium

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update weather data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push