name: Scrape Met Office Weather

on:
  schedule:
    - cron: "30 2 * * *"   # 2:30 AM UTC = 8:00 AM IST daily
  workflow_dispatch:         # manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-22.04    # use 22.04 — avoids libasound2 issue on 24.04

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install playwright==1.44.0
          python -m playwright install chromium --with-deps

      - name: Run scraper
        run: python scraper.py

      - name: Commit and push updated JSON
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: update weather data $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push